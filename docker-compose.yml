name: ttcs-qr

services:
  qr_mongodb:
    image: mongo:6.0
    container_name: qr_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-qr_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-qr_secure_password}
    ports:
      - "${MONGO_HOST_PORT:-27018}:27017"
    volumes:
      - qr_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - default

  qr_redis:
    image: redis:7-alpine
    container_name: qr_redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - default

  qr_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qr_service_app
    restart: unless-stopped
    depends_on:
      qr_mongodb:
        condition: service_healthy
      qr_redis:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-8001}:8000"
    env_file:
      - .env
    environment:
      MONGO_HOST: qr_mongodb
      MONGO_DATABASE: ${MONGO_DATABASE:-qr_attendance_db}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-qr_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-qr_secure_password}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-ttcs_rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      REDIS_HOST: qr_redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - default
      - ttcs_shared

volumes:
  qr_mongo_data:

networks:
  default:
  ttcs_shared:
    external: true
    name: ttcs_shared
